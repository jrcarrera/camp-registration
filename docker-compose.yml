name: camp-registration

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: camp_registration
      POSTGRES_PASSWORD: camp
      POSTGRES_USER: camp
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U camp -d camp_registration']
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - '5432:5432'
    volumes:
      - ./infra/local/postgres:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: camp-local-secret
      MINIO_ROOT_USER: camp-local
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:v1.27.8
    ports:
      - '1025:1025'
      - '8025:8025'

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command:
      ['sh', '-c', 'node packages/database/dist/migrate.js && node packages/database/dist/seed.js']
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MIGRATION_DATABASE_URL: postgresql://camp:camp@postgres:5432/camp_registration

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3001
      DATABASE_URL: postgresql://camp_app:camp-app-local@postgres:5432/camp_registration
      LOCAL_ACTOR_ID: local-camp-admin
      LOCAL_AUTH_ENABLED: 'true'
      LOCAL_ORGANIZATION_ID: a60b272f-b028-4f1a-b666-3ef3cffd9827
      NODE_ENV: development
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:3001/ready']
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - '3001:3001'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_INTERNAL_BASE_URL: http://api:3001
      HOSTNAME: 0.0.0.0
      NODE_ENV: development
      PORT: 3000
    ports:
      - '3000:3000'

volumes:
  minio_data:
  postgres_data:
